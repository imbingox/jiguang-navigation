services:
  jg_nav:
    image: ghcr.io/sxt2204/jiguang-navigation:latest
    container_name: jg_nav
    ports:
      - "8002:8002"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/dev.db
      - SESSION_SECRET=${SESSION_SECRET:?set SESSION_SECRET in .env}
    volumes:
      - data:/app/data
    restart: unless-stopped

volumes:
  data:

services:
  jg_nav:
    image: ghcr.io/imbingox/jiguang-navigation:latest
    container_name: jg_nav
    ports:
      - "8002:8002"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/dev.db
      - OWNER_PASSWORD=change-this-before-going-public
    volumes:
      - ./data:/app/data
    restart: unless-stopped
